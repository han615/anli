<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id选择器</title>
    <style>
        #bold{
            font-weight: bold;
        }
        #font24{
            font-size: 24px;
        }
    </style>
</head>
<body>
    <!-- <h2>古之学者必有师。师者，所以传道受业解惑也 。</h2> -->
    <p id="bold">段落1设置粗体文字。</p>
    <p id="font24">段落设置字号为24px。</p>
    <p id="font24">段落3设置字号为24px。</p>
    <p id="bold font24">段落4同时设置粗体和字号24px。</p>

</body>
</html>
