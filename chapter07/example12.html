<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>为下拉列表中的选项分组</title>
</head>
<body>
<form action="#" method="post">
城区：<br />
	<select>
        <optgroup label="北京">
            <option>东城区</option>
            <option>西城区</option>
            <option>朝阳区</option>
            <option>海淀区</option>
        </optgroup>
        <optgroup label="上海">
            <option>浦东新区</option>
            <option>徐汇区</option>
            <option>虹口区</option>
        </optgroup>
    </select>
</form>
</body>
</html>
