<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS控制表格边框</title>
    <style type="text/css">
        table{
            width:800px;
            height:300px;
            border:1px solid #30F;      /*设置table的边框*/
            
        }
        th,td{border:1px solid #30F;}  /*为单元格单独设置边框*/
    </style>
</head>
<body>
    <table>
    <caption></caption>    <!--caption定义表格的标题-->
     <tr>
        <th>诗歌序号</th>
        <th>诗歌名称</th>
        <th>作者</th>
        <th>内容</th>
     </tr>
     <tr>
        <th>1</th>
        <td>《峨眉山月歌》</td>
        <td>李白</td>
        <td>峨眉山月半轮秋，影入平羌江水流。夜发清溪向三峡，思君不见下渝州。</td>
     </tr>
     <tr>
        <th>2</th>
        <td>《江南逢李龟年》</td>
        <td>杜甫</td>
        <td>岐王宅里寻常见，崔九堂前几度闻。正是江南好风景，落花时节又逢君。</td>
     </tr>
     <tr>
        <th>3</th>
        <td>《行军九日思长安故园》</td>
        <td>岑参</td>
        <td>强欲登高去，无人送酒来。遥怜故园菊，应傍战场开。</td>
     </tr>
     <tr>
        <th>4</th>
        <td>《夜上受降城闻笛》</td>
        <td>李益</td>
        <td>回乐烽前沙似雪，受降城外月如霜。不知何处吹芦管，一夜征人尽望乡。</td>
     </tr>
     <tr>
        <th>5</th>
        <td>《秋夕》</td>
        <td>杜牧</td>
        <td>银烛秋光冷画屏，轻罗小扇扑流萤。天阶夜色凉如水，卧看牵牛织女星。</td>
     </tr>
    </table>
</body>
</html>
