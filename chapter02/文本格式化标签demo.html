<body>
    <p>明月几时有？把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，<mark>高处不胜寒</mark>。起舞弄清影，何似在人间。转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆？<mark>人有悲欢离合，月有阴晴圆缺</mark>，此事古难全。<mark>但愿人长久，千里共婵娟</mark>。</p>
