    <p>被称作“第四代体育馆”的“鸟巢”国家体育场是2008年北京奥运会的标志性建筑，它位于北京北四环附近，包含在奥林匹克森林公园之中。它的占地面积为20.4万平方米，总建筑面积为25.8万平方米，拥有9.1万个固定座位，内设餐厅、运动员休息室、更衣室等。在2008年奥运会期间，开幕式、闭幕式、田径比赛、男子足球决赛等赛事活动均在“鸟巢”举办。</p>
