<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>列表的嵌套</title>
</head>
<body>
	<ul>
		<li>咖啡
			<ol>                 <!--有序列表的嵌套-->
				<li>拿铁</li>
				<li>摩卡</li>
			</ol>
		</li>
		<li>茶
			<ul>                     <!--无序列表的嵌套--> 
				<li>碧螺春</li>
				<li>龙井</li>
			</ul>
		</li>
	</ul>
</body>
</html>
