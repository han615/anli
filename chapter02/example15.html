<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>section标签</title>
</head>
<body>
    <article>
        <header>
            <h2>小张的个人介绍</h2>
        </header>
        <p>小张是一个好学生，并且是一个男生。</p>
        <section>
            <h2>评论</h2>
            <article>
                <h3>评论者：A</h3>
                <p>小张爱打球。 </p>
            </article>
            <article>
                <h3>评论者：B</h3>
                <p>小张学习好。</p>
            </article>
        </section>
    </article>   
</body>
</html>
