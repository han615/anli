<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:first-child选择器和:last-child选择器</title>
    <style type="text/css">
        p:first-child{
        color:pink;
        font-size:16px;
        font-family:"宋体";	
        }
        p:last-child{
        color:blue;
        font-size:16px;
        font-family:"微软雅黑";
        }
    </style>
</head>
<body>
    <p>这个段落是其父元素（body）的首个子元素。</p>
    <p>第二篇 关于考试</p>
    <p>第三篇 夏日飞舞</p>
    <p>第四篇 惆怅的心</p>
    <p>第五篇 畅谈美丽,这是父元素（body）的最后一个子元素</p>
<hr>
<div>
    <p>第一篇 毕业了/这个段落是其父元素（div）的首个子元素。</p>
    <p>第二篇 关于考试</p>
    <p>第三篇 夏日飞舞</p>
    <p>第四篇 惆怅的心</p>
    <p>第五篇 畅谈美丽,这是父元素（div）的最后一个子元素</p>
</div>


</body>
</html>
