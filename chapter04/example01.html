<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E[attribute]选择器</title>
    <style>
        [id]{
            font-size:36px;
            color:#f00;
        }
    </style>
</head>
<body>
    <p id="one">啊，朋友！</p>
    <h2 id="two">黄河以它英雄的气魄，</h2>
    <p class="two">出现在亚洲的原野。</p>
</body>
</html>
