<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:not选择器</title>
    <style type="text/css">
            p{color: #333;} /* 需要单独定义样式，否则为全部标签添加样式 */
                :not(p){
            color:orange;
            font-size: 20px;
            font-family: "宋体";
        }
    </style>
</head>
<body>
    <h3>《约客》</h3>	
    <p>黄梅时节家家雨，</p> 
    <p class="one">青草池塘处处蛙。</p> 
    <p>有约不来过夜半，</p> 
    <strong>闲敲棋子落灯花。</strong>
</body>
</html>
