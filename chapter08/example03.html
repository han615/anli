<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用CSS控制视频的宽度和高度</title>
    <style type="text/css">
    *{
        margin:0; 
        padding:0;
    }
    div{
        width:600px;
        height:300px;
        border:1px solid #000;
    }
    video{
        background:#9CCDCD;
        float:left;	
    }
    p{
        width:200px;
        height:300px;
        background:#999;
        float:left;	
    }
    </style>
</head>
<body>
    <div>
        <p>占位色块</p>
        <video src="video/duanwu.mp4" controls="controls">浏览器不支持video标签</video>
        <p>占位色块</p>
    </div>
</body>
</html>
