<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>translate3D()</title>
    <style type="text/css">
        div{
            width:200px;
            height:200px;
            border:2px solid #000;
            position:relative;
            transition:all 1s ease 0s;           /*设置过渡效果*/
            transform-style:preserve-3d;         /*保存嵌套元素的3D空间*/
        }
        img{
            position:absolute;
            top:0;
            left:0;
            transform:translateZ(100px);
        }
        .no2{
            transform:rotateX(90deg) translateZ(100px);
        }
        div:hover{
            transform:rotateX(-90deg);           /*设置旋转角度*/
        }
        div:visited{
            transform:rotateX(-90deg);           /*设置旋转角度*/
            transition:all 1s ease 0s;           /*设置过渡效果*/
            transform-style:preserve-3d;         /*规定被嵌套元素如何在3D空间中显示*/
        }
    </style>
</head>
<body>
    <div>
        <img class="no1" src="images/1.png" alt="1">
        <img class="no2" src="images/2.png" alt="2">
    </div>
</body>
</html>
