<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition-timing-function属性</title>
    <style type="text/css">
    div{
        width:424px;
        height:406px;
        margin:0 auto;
        background:url(images/HTML5.png) center center no-repeat;
        border:5px solid #333;
        border-radius:0px;	
        }
    div:hover{
        border-radius:50%;
        transition-property:border-radius;  /*指定动画过渡的CSS属性*/
        transition-duration:2s;  /*指定动画过渡的时间*/
        transition-timing-function:ease-in-out;  /*指定动画过以慢速开始和结束的过渡效果*/
        transition-delay:2s;    /*指定动画延迟触发*/
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
