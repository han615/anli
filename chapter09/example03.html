<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>translate()</title>
    <style type="text/css"> 
    div{
        width:100px;
        height:50px;
        background-color:#0CC;
    }
    #div2{transform:translate(100px,30px);}
    </style>
</head>
<body>
    <div>盒子1：我寄愁心与明月，</div>
    <div id="div2">盒子2：随君直到夜郎西。</div>
</body>
</html>
