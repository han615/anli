<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置背景图像的位置</title>
    <style type="text/css">
body{
	background-image:url(images/ai.png);     /*设置网页的背景图像*/
	background-repeat:no-repeat;      /*设置背景图像不平铺*/
    background-position:50px 80px;    /*用像素值控制背景图像的位置*/       
}


    </style>
</head>
<body>
    <h2>爱岗敬业，乐于奉献</h2>
    <p> 当我们把爱岗敬业当作人生追求，我们就会在工作上少一些计较、多一些奉献，少一些抱怨、多一些责任感，少一些懒惰、多一些上进心，就能够享受工作给自己带来的快乐和充实感，就能够更加珍惜自己的工作，抱着感恩、努力的态度把工作做得尽善尽美，最终赢得大家的尊重和认可。</p>
</body>
</html>
