<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置边框宽度</title>
    <style type="text/css">
        .one{border-width:3px;}
        .two{border-width:3px 1px;}
        .three{border-width:3px 1px 2px;}
        
    </style>
</head>
<body>
    <p class="one">盼望着，盼望着，东风来了，春天的脚步近了。</p>
    <p class="two">盼望着，盼望着，东风来了，春天的脚步近了。</p>
    <p class="three">盼望着，盼望着，东风来了，春天的脚步近了。</p>
</body>
</html>
