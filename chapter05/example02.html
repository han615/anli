<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置边框样式</title>
    <style type="text/css">
        h2{border-style:double;}                  /*4条边框相同均为双实线*/
        .one{border-style:dotted solid;}		  /*上下边框为点线，左右边框为单实线*/
        .two{border-style:solid dotted dashed;}   /*上边框为实线、左右边框为点线、下边框为虚线*/
    </style>
</head>
<body>
    <h2>《已亥杂诗》</h2>
    <p class="one">段落1：浩荡离愁白日斜，吟鞭东指即天涯。</p>
    <p class="two">段落2：落红不是无情物，化作春泥更护花。</p>
</body>
</html>
