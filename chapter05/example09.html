<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型的宽度属性与高度属性</title>
    <style type="text/css">
    .box{
        width:450px;                  /*设置段落的宽度*/
        height:120px;                 /*设置段落的高度*/
        border:8px solid #00f;      /*设置段落的边框*/
    }
    </style>
</head>
<body>
    <p class="box">奉献就像蒲公英的种子，随风飘散，落到哪里就在哪里生根、成长。</p>
</body>
</html>
