<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div标签</title>
    <style type="text/css">
    .one{
        width:600px;               /*设置宽度*/
        height:50px;               /*设置高度*/
        background:aqua;          /*设置背景颜色*/
        font-size:20px;           /*设置字体大小*/
        font-weight:bold;         /*设置字体加粗*/
        text-align:center;        /*设置文本内容水平居中对齐*/
        }
    .two{
        width:600px;                 /*设置宽度*/
        height:100px;                /*设置高度*/
        background:lime;            /*设置背景颜色*/
        font-size:14px;             /*设置字体大小*/
        text-indent:2em;            /*设置首行文本缩进2字符*/
        }
    </style>
    </head>
    <body>
    <div class="one">
        爱岗敬业，无私奉献
    </div>
    <div class="two">
        <p>青春在平凡的工作岗位上闪光。</p>
    </div>
    </body>
    </html>
