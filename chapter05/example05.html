<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆角边框</title>
    <style type="text/css">
        img{
            border:8px solid #75406a;
            border-radius:50px;  /*设置水平半径为100像素，垂直半径为50像素*/
        }
        img{border-radius:50px 20px/30px 60px;}  
        img{border-radius:50px 20px 10px/30px 40px 60px;} 
        img{border-radius:50px 30px 20px 10px/50px 30px 20px 10px;}
        img{border-radius:50%;}  
    </style>
</head>
<body>
    <img class="yuanjiao" src="images/tupian1.jpg" alt="圆角边框" />
</body>
</html>
